<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Chatbot - AI Powered</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Sidebar for Setup -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>PDF Chatbot </h2>
                <p>Upload a PDF and ask questions from the PDF</p>
            </div>

            <div class="sidebar-section">
                <label for="api-key">API Key</label>
                <input type="password" id="api-key" placeholder="Enter your Google API Key..." autocomplete="off"
                    value="AIzaSyCX5tPN4N2VAzVg9eFMyXEhMJHX08hv544">

            </div>

            <div class="sidebar-section">
                <label for="pdf-upload" class="upload-btn">
                    <span style="font-size: 24px; margin-bottom: 8px;">📄</span>
                    <span style="font-weight: 500;">Choose PDF Document</span>
                    <input type="file" id="pdf-upload" accept="application/pdf">
                </label>
                <div id="file-name">No file selected</div>
                <button id="upload-btn" class="primary-btn" disabled>Upload and Index PDF</button>
            </div>

            <div id="status-panel" class="status-panel hidden">
                <p id="status-text"></p>
                <div class="loader" id="loader"></div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div id="chat-messages" class="chat-messages">
                <div class="message system">
                    <div class="message-content">
                        <strong>Hello! 👋</strong><br><br>
                        Please upload a PDF on the left to get started.
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <input type="text" id="chat-input" placeholder="Ask a question about your PDF..." disabled>
                <button id="send-btn" disabled title="Send Message">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
